version: "3.9"

services:

  # ── Tier 1: Nginx reverse proxy ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "8080:80"          # access the entire app at http://localhost:8080
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_started
      api:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped

  # ── Tier 2a: Frontend (static HTML served by nginx) ─────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    networks:
      - app_network
    restart: unless-stopped

  # ── Tier 2b: Flask REST API ──────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: flask_api
    environment:
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Tier 3: PostgreSQL database ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data   # named volume = data persists
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  app_network:
    driver: bridge
    # All 4 containers share this network.
    # They reach each other by service name (e.g. host=postgres, host=api)
    # Nothing is exposed to the host EXCEPT port 8080 on nginx.

volumes:
  postgres_data:
    # Named volume — data survives docker-compose down.
    # Only destroyed with: docker-compose down -v
